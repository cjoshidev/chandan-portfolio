name: Notify subscribers of new post

on:
  push:
    branches:
      - main
    paths:
      - 'src/content/*.md'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect newly added posts
        id: detect
        run: |
          ADDED=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'src/content/*.md')
          if [ -z "$ADDED" ]; then
            echo "no_new_posts=true" >> "$GITHUB_OUTPUT"
          else
            POSTS_JSON="["
            FIRST=1
            while IFS= read -r file; do
              SLUG=$(basename "$file" .md)
              TITLE=$(grep -m1 '^title:' "$file" | sed 's/^title:[[:space:]]*//' | tr -d '"')
              if [ $FIRST -eq 0 ]; then POSTS_JSON="$POSTS_JSON,"; fi
              POSTS_JSON="$POSTS_JSON{\"slug\":\"$SLUG\",\"title\":\"$TITLE\"}"
              FIRST=0
            done <<< "$ADDED"
            POSTS_JSON="$POSTS_JSON]"
            echo "posts_json=$POSTS_JSON" >> "$GITHUB_OUTPUT"
            echo "no_new_posts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if no new posts
        if: steps.detect.outputs.no_new_posts == 'true'
        run: echo "No new blog posts detected — skipping notification."

      - name: Set up Node.js
        if: steps.detect.outputs.no_new_posts == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.detect.outputs.no_new_posts == 'false'
        run: npm ci --omit=dev

      - name: Send subscriber notifications
        if: steps.detect.outputs.no_new_posts == 'false'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          POSTS_JSON: ${{ steps.detect.outputs.posts_json }}
        run: |
          node --input-type=module << 'SCRIPT'
          import { createClient } from '@supabase/supabase-js';
          import { Resend } from 'resend';

          const supabase = createClient(
            process.env.SUPABASE_URL,
            process.env.SUPABASE_SERVICE_ROLE_KEY
          );
          const resend = new Resend(process.env.RESEND_API_KEY);
          const siteUrl = process.env.SITE_URL;
          const posts = JSON.parse(process.env.POSTS_JSON);

          const { data: subscribers, error } = await supabase
            .from('subscribers')
            .select('email');

          if (error) {
            console.error('Failed to fetch subscribers:', error);
            process.exit(1);
          }

          if (!subscribers || subscribers.length === 0) {
            console.log('No subscribers yet.');
            process.exit(0);
          }

          console.log(`Sending to ${subscribers.length} subscriber(s) about ${posts.length} new post(s).`);

          const postLinks = posts
            .map(p => `<li><a href="${siteUrl}/blog/${p.slug}">${p.title}</a></li>`)
            .join('');

          const subject = posts.length === 1
            ? `New post: ${posts[0].title}`
            : `${posts.length} new posts on Chandan's logs`;

          const html = `
            <p style="font-family: monospace; color: #111; line-height: 1.8;">
              New post${posts.length > 1 ? 's' : ''} just dropped:<br/><br/>
              <ul>${postLinks}</ul>
              <br/>
              — Chandan<br/><br/>
              <small style="color: #888;">
                You're receiving this because you subscribed at
                <a href="${siteUrl}/blog">${siteUrl}/blog</a>.
              </small>
            </p>
          `;

          for (const { email } of subscribers) {
            const { error: sendErr } = await resend.emails.send({
              from: 'Chandan Joshi <hello@chandanjoshi.dev>',
              to: email,
              subject,
              html,
            });
            if (sendErr) {
              console.error(`Failed to email ${email}:`, sendErr);
            } else {
              console.log(`Sent to ${email}`);
            }
          }
          SCRIPT
